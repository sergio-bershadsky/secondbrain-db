# go-test-coverage configuration
# https://github.com/vladopajic/go-test-coverage

profile: coverage.out

threshold:
  file: 0
  package: 50
  total: 60

override:
  # Semantic package calls external APIs — can't test without mock server
  - path: ^internal/semantic/.*
    threshold: 0
  - path: ^pkg/sbdb/semantic/.*
    threshold: 0
  # Version is trivial
  - path: ^internal/version/.*
    threshold: 0
  - path: ^pkg/sbdb/version/.*
    threshold: 0
  # CLI bootstrap glue is exercised end-to-end by the e2e suite but uses
  # subprocess execution — not instrumented by `go test -coverprofile`.
  # Behaviour is verified via e2e/, not unit tests.
  - path: ^internal/cli/runtime/.*
    threshold: 0
  - path: ^internal/cli/output/.*
    threshold: 50

exclude:
  # Exclude generated files
  paths:
    - \.pb\.go$
    - _test\.go$
