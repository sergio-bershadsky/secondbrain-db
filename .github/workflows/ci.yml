name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Go version is sourced from go.mod via go-version-file. Whenever go.mod's
# `go X.Y` directive changes, every job picks it up automatically — no risk
# of CI pinning lagging behind the codebase and triggering flaky toolchain
# auto-downloads at runtime.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  format:
    name: Format / vet / mod-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: gofmt -l (no diff allowed)
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: goimports -l (no diff allowed)
        run: |
          out=$(goimports -l .)
          if [ -n "$out" ]; then
            echo "::error::goimports found files with import drift:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...
      - name: go mod tidy is clean
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go mod tidy produced diff - commit it"
            git --no-pager diff go.mod go.sum
            exit 1
          fi

  vulncheck:
    name: govulncheck (advisory)
    runs-on: ubuntu-latest
    # Advisory only: stdlib CVEs against the pinned Go version surface here;
    # bumping Go in go.mod clears them. Doesn't block PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan for known vulnerabilities
        env:
          CGO_ENABLED: "1"
        run: govulncheck ./...

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run all tests
        env:
          CGO_ENABLED: "1"
        run: go test ./... -race -count=1

  stress-concurrency:
    name: Stress events concurrency (-count=20 -race)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Stress events package
        env:
          CGO_ENABLED: "1"
        run: go test ./pkg/sbdb/events/... -race -count=20 -timeout=15m

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate coverage
        env:
          CGO_ENABLED: "1"
        run: |
          go test $(go list ./internal/... | grep -v /semantic | grep -v /version) \
            -coverprofile=coverage.out -covermode=atomic
      - name: Check coverage thresholds
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  e2e:
    name: E2E (built binary)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run e2e suite
        env:
          CGO_ENABLED: "1"
        run: go test -tags=e2e -race -count=1 -timeout=5m ./e2e/...

  build:
    name: Build
    needs: [lint, format, test, coverage, stress-concurrency, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        run: go build -o sbdb .
      - name: Verify binary
        run: ./sbdb version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbdb-linux-amd64
          path: sbdb
