version: 2

builds:
  - main: .
    binary: sbdb
    env:
      - CGO_ENABLED=0
    ldflags:
      # injected (lower-case) is the new entry point in internal/version;
      # see the package doc for the resolution chain. The previous .Version
      # symbol still exists for backward-compat readers but is no longer the
      # write target.
      - -s -w -X github.com/sergio-bershadsky/secondbrain-db/internal/version.injected={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
