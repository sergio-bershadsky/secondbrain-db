version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - misspell
    - ineffassign

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/sergio-bershadsky/secondbrain-db

issues:
  exclude-dirs:
    - testdata
